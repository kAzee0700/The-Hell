<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0f0f14"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(8, 8)">
    <rect x="0" y="0" width="3" height="16" rx="0.5" fill="#ff5a36" filter="url(#glow)"/>
    <rect x="12" y="0" width="3" height="16" rx="0.5" fill="#ff5a36" filter="url(#glow)"/>
    <rect x="0" y="6" width="15" height="3" rx="0.5" fill="#ff5a36" filter="url(#glow)"/>
  </g>
</svg>
