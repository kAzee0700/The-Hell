<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 36" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(2, 8)">
    <rect x="0" y="0" width="4" height="20" rx="1" fill="#ff5a36" filter="url(#glow)"/>
    <rect x="14" y="0" width="4" height="20" rx="1" fill="#ff5a36" filter="url(#glow)"/>
    <rect x="0" y="6" width="18" height="4" rx="1" fill="#ff5a36" filter="url(#glow)"/>
  </g>
  
  <text x="30" y="28" 
        font-family="'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="25" 
        font-weight="700" 
        fill="#f3f3f6"
        letter-spacing="-1">
    지옥
  </text>
</svg>
