<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="2" y="4" width="3" height="16" rx="1" fill="#ff5a36" filter="url(#glow)"/>
  <rect x="13" y="4" width="3" height="16" rx="1" fill="#ff5a36" filter="url(#glow)"/>
  <rect x="2" y="9" width="14" height="3" rx="1" fill="#ff5a36" filter="url(#glow)"/>
</svg>
